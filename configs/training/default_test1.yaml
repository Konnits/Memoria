num_epochs: 20
device: "cuda"          # o "cpu" según tu entorno
loss_name: "mse"
grad_clip_norm: 1.0
log_every_n_steps: 50
use_amp: true

# Carpeta donde se guardarán logs, checkpoints y configs usadas
checkpoint_dir: "experiments/exp_default"

# Métrica para decidir el "mejor" modelo
save_best_on: "val_rmse"

# Semilla global
seed: 42

optimizer:
  optimizer_name: "adam"
  lr: 0.001
  weight_decay: 0.0
  momentum: 0.9
  betas: [0.9, 0.999]

  scheduler_name: "cosine"     # "step", "cosine" o null
  scheduler_step_size: 10
  scheduler_gamma: 0.1
  scheduler_T_max: 20