num_epochs: 60
device: "cuda"
loss_name: "mse"
grad_clip_norm: 1.0
log_every_n_steps: 50
early_stopping_patience: 15
early_stopping_min_delta: 0.00005
restore_best_weights: true
use_amp: true
enable_cuda_runtime_optimizations: true
use_torch_compile: false
torch_compile_mode: "reduce-overhead"
torch_compile_fullgraph: false

checkpoint_dir: "experiments/exp_real_data1"
save_best_on: "val_rmse"
seed: 42

optimizer:
  optimizer_name: "adamw"
  lr: 0.0002
  weight_decay: 0.01
  momentum: 0.9
  betas: [0.9, 0.98]

  scheduler_name: "cosine_warmup"
  scheduler_step_size: 10
  scheduler_gamma: 0.1
  scheduler_T_max: 60
  warmup_epochs: 5
