name: pretrain_real_data1_search
strategy: random
metric: val_rmse
mode: min
seed: 42
max_trials: 12

parameters:
  - section: model
    path: d_model
    values: [64, 128]

  - section: model
    path: num_layers
    values: [2, 4]

  - section: training
    path: optimizer.lr
    values: [0.001, 0.0005, 0.0002]

  - section: training
    path: input_noise_std
    values: [0.0, 0.02, 0.05]

  - section: data
    path: target_offset_max
    values: [4, 8]