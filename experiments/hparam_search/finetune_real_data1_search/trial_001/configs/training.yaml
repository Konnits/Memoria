num_epochs: 20
device: cuda
loss_name: mse
grad_clip_norm: 1.0
log_every_n_steps: 50
freeze_encoder_epochs: 3
unfreeze_lr: 0.0001
input_noise_std: 0.0
early_stopping_patience: 6
early_stopping_min_delta: 5.0e-05
restore_best_weights: true
checkpoint_dir: experiments/hparam_search/finetune_real_data1_search/trial_001
save_best_on: val_rmse
seed: 42
optimizer:
  optimizer_name: adam
  lr: 0.0005
  weight_decay: 0.0
  momentum: 0.9
  betas:
  - 0.9
  - 0.999
  scheduler_name: cosine
  scheduler_step_size: 10
  scheduler_gamma: 0.1
  scheduler_T_max: 20
